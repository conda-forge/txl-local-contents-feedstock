{% set python_min = "3.10" %}
{% set name = "txl-local-contents" %}
{% set version = "0.3.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/txl_local_contents-{{ version }}.tar.gz
  sha256: 0985971fbb415e0b1de127d65c4ce4cfc275116b8cc59e84ac026980b063f350

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - txl =0.3.2
    - anyio >=3.7.0,<5
    - jupyter_ydoc >=3.0.2,<4.0.0

test:
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
  imports:
    - txl_local_contents

about:
  home: https://github.com/davidbrochart/jpterm/blob/main/plugins/local_contents
  summary: TXL plugin for local contents
  dev_url: https://github.com/davidbrochart/jpterm/blob/main/plugins/local_contents
  license_file: LICENSE.txt
  license: MIT
  license_family: MIT

extra:
  recipe-maintainers:
    - davidbrochart
